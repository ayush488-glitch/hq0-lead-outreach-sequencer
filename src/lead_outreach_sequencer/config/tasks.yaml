---
research_lead_intelligence:
  description: >
    Build a complete intelligence brief on {lead_name} using only the data provided below.
    No web scraping or searching needed — everything required is here.

    LEAD PROFILE:
    Name: {lead_name}
    Email: {lead_email}
    Company: {company_name}
    Headline: {lead_headline}
    Location: {lead_location}
    Recent LinkedIn posts: {recent_posts}

    LINKEDIN CONVERSATION (between {colleague_name} and {lead_name}):
    {conversation_history}

    Extract carefully:
    1. What {lead_name} said, asked, or showed interest in
    2. Any objection or hesitation they expressed
    3. Where the conversation ended and what tone they left on
    4. The single strongest re-engagement hook based on their actual words
    5. Which hq0 features are most relevant to their role and what they discussed
    6. Tone guidance — what register will land best with this person
  expected_output: >
    A structured brief with:
    1. Lead snapshot (role, company, what they do in 2 sentences)
    2. Conversation summary — what was discussed, what they showed interest in, any objections, where it ended
    3. Best re-engagement hook (the single strongest specific angle)
    4. Relevant hq0 features to mention (tied to their context)
    5. Tone and register guidance
  agent: lead_researcher

draft_personalized_email:
  description: >
    Using the intelligence brief, write a re-engagement email to {lead_name}.
    Sender is Agnes Allison. The original LinkedIn outreach was done by {colleague_name}.

    BANNED PHRASES — hard rules, zero exceptions. If any appear, rewrite the entire sentence:
    "I wanted to reach out" / "I hope this finds you well" / "I wanted to follow up"
    / "touching base" / "circling back" / "figured it was worth" / "Our platform"
    / "keeps things professional" / "simplifying the process" / "managing engagements"
    / "Please let me know if you have any questions" / "exciting" / "leverage" / "streamline"
    / Any sentence starting with "Our" or "I"
    / Any em dash (the — character) anywhere in the email
    / Any domain name or URL of any kind — no meet.X.com, no hq0.com, no http links, nothing
    / Any placeholder text like "[video link]" or "[link]" — never invent content not given

    DOMAIN/URL RULE: Do NOT write any domain name at all. Not "meet.helpdeveloping.com",
    not "hq0.com", not any URL. If you want to reference the branded meeting link concept,
    say "a branded meeting link" or "your own meeting page" — never the actual domain.

    EDGE CASES:
    - If the lead tried to pitch their own services back, acknowledge briefly but still
      pivot to the hq0 re-engagement — stay on task, this is a follow-up email.
    - If the lead asked for a video or demo, offer a free signup or quick call instead,
      never fabricate a link or placeholder.

    STRICT FORMAT:
    1. Subject line: specific to this person and what they said. Not generic, not "Re: our LinkedIn convo",
       not "Quick question", not "Following up on our chat".
       Think: what subject would make {lead_name} recognize this as being about their specific conversation.
       Good examples: "A few things added since {colleague_name} reached out" /
       "What you asked about when {colleague_name} connected"
    2. Greeting: Hi {lead_name},
    3. Body: exactly 3 short paragraphs, each separated by a blank line. NO wall of text, no single block.
       Paragraph 1: 1 to 2 sentences. Reference {colleague_name} by name and the specific thing discussed.
       Paragraph 2: 1 to 2 sentences. One relevant hq0 feature woven naturally into their context. No URLs.
       Paragraph 3: 1 sentence. A soft natural question — free signup or quick look. No URL.
       Write like a real person, not a pitch deck. Conversational, warm, specific to this lead.
    4. Sign off: blank line, then Best, then Agnes on the next line.
    5. Zero em dashes. Zero exclamation marks. Zero bullet points. Zero URLs. Zero domain names.
  expected_output: >
    Exactly this format, nothing else:

    Subject: [subject line]

    Hi {lead_name},

    [1 sentence — {colleague_name} + specific thing discussed]

    [1 to 2 short sentences — relevant hq0 feature, no URL]

    [1 sentence — soft CTA question]

    Best,
    Agnes
  agent: personalized_outreach_specialist
  context:
    - research_lead_intelligence

send_email_via_gmail:
  description: >
    The dry_run flag is: {dry_run}

    If {dry_run} is "true" or "True" or "yes":
      DO NOT send any email.
      Output the full drafted email exactly as-is from the previous task,
      labelled clearly as "DRY RUN PREVIEW — email NOT sent:"

    If {dry_run} is "false" or "False" or "no":
      You MUST use the google_gmail/send_email tool to send the email right now.
      Do not describe what you would do. Do not say you cannot send emails.
      You have the google_gmail/send_email tool available — call it with these exact parameters:
        to: {lead_email}
        bcc: ayush@sbl.so,team@sbl.so
        subject: [exact subject line from the drafted email]
        body: [the email body converted to HTML for proper Gmail rendering:
               - Replace every blank line between paragraphs with </p><p>
               - Wrap the entire body in <p>...</p> tags
               - The sign-off "Best,\nAgnes" becomes Best,<br>Agnes
               - Example: <p>First paragraph text.</p><p>Second paragraph text.</p><p>Third paragraph question.</p><p>Best,<br>Agnes</p>]
      Do not modify the subject or text content. Only convert formatting to HTML.
      After the tool confirms, report the recipient, subject, and that it was sent.
  expected_output: >
    If dry_run:
      "DRY RUN PREVIEW — email NOT sent:
      [full email subject and body]"

    If not dry_run:
      Confirmation that the google_gmail/send_email tool was called, including
      recipient, CC addresses, and subject line used.
  agent: email_dispatcher
  context:
    - draft_personalized_email
