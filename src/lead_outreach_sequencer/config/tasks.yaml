---
research_lead_intelligence:
  description: >
    Research {lead_name} at {company_name} to build a complete intelligence picture
    before writing an outreach email. Use all available tools.

    Step 1 — Scrape their company website ({company_website}) to understand:
    - What the company actually does and who their customers are
    - Any clues about their current meeting/collaboration tools

    Step 2 — Search the web for recent news about {company_name} and {lead_name}:
    - Recent funding, hires, product launches, or any signal of growth or pain

    Step 3 — Analyze the conversation history carefully:
    {conversation_history}

    Extract: relationship stage, what interest they showed, objections raised,
    what {colleague_name} said that got traction, and the strongest re-engagement angle.
  expected_output: >
    A structured intelligence brief with:
    1. Company snapshot (2-3 sentences)
    2. Lead profile and likely pain points with current meeting tools
    3. Conversation summary — what was discussed, what they showed interest in, any objections
    4. Best re-engagement angle (the single strongest hook)
    5. Relevant hq0 features to mention (specific to their context)
    6. Tone guidance and callback to something specific they said
  agent: lead_researcher

draft_personalized_email:
  description: >
    Using the intelligence brief, write a re-engagement email to {lead_name}.
    Sender is {sender_name}. Original LinkedIn outreach was by {colleague_name}.

    BANNED PHRASES — rewrite if any appear:
    "I wanted to reach out" / "I hope this finds you well" / "I wanted to reassure you"
    / "Our platform" / "keeps things professional" / "simplifying the process"
    / "managing engagements" / "Please let me know if you have any questions"
    / Any sentence starting with "Our"

    STRICT RULES:
    1. Max 4 sentences in the body
    2. First sentence: mention {colleague_name} reached out on LinkedIn + the specific thing discussed
    3. Middle: what's new at hq0 — 2-3 features woven into one flowing sentence, not listed
    4. End: one soft open question ("Would you want to take another look?" style)
    5. Sign off: "Best," then {sender_name}

    SUBJECT LINE — must feel like a real person, referencing the specific prior conversation.
    GOOD: "Following up on the ReboundTAG room" / "A few things added since Mahi reached out"
    BAD: anything generic, any "!" marks, "Quick question", "Exciting updates"
  expected_output: >
    Exactly this format, nothing else:

    Subject: [subject line]

    Hi {lead_name},

    [4 sentences max]

    Best,
    {sender_name}
  agent: personalized_outreach_specialist
  context:
    - research_lead_intelligence

send_email_via_gmail:
  description: >
    Check the dry_run flag: {dry_run}

    If {dry_run} is "true" or "True" or "yes":
      DO NOT send any email.
      Output the full drafted email exactly as it appears from the previous task,
      clearly labelled as "DRY RUN PREVIEW — email NOT sent:"
      This allows the human reviewer to read and approve the draft before sending.

    If {dry_run} is "false" or "False" or "no":
      Send the drafted email to {lead_email} via Gmail.
      CC ayush@sbl.so.
      Use the exact subject line and body from the draft — do not modify anything.
      Confirm successful delivery.
  expected_output: >
    If dry_run:
      "DRY RUN PREVIEW — email NOT sent:
      [full email subject and body]"

    If not dry_run:
      Confirmation including recipient, CC, subject line used, and delivery status.
  agent: email_dispatcher
  context:
    - draft_personalized_email
