---
research_lead_intelligence:
  description: >
    Research {lead_name} at {company_name} to build a complete intelligence picture
    before writing an outreach email. Use all available tools.

    Step 1 — Scrape their company website ({company_website}) to understand:
    - What the company actually does (product, service, industry)
    - Who their customers are
    - What their brand/positioning looks like
    - Any clues about their current meeting/collaboration tools

    Step 2 — Search the web for recent news about {company_name} and {lead_name}:
    - Recent funding, hires, product launches
    - Any news that signals growth, change, or pain
    - Their role and seniority context

    Step 3 — Analyze the conversation history carefully:
    {conversation_history}

    From this conversation extract:
    - What stage is this relationship? (first contact, warm lead, previous objection, said yes, said no)
    - What specific interest or signal did {lead_name} express about hq0?
    - What objection did they raise, if any? (e.g., "we already have tools", "too busy", "not interested")
    - What features were discussed or seemed most relevant to them?
    - What did {colleague_name} say that got the most traction?
    - What is the strongest re-engagement angle given everything above?

    Combine all of this into a sharp intelligence brief that gives the copywriter
    exactly what they need to write a precise, relevant email — not a generic one.
  expected_output: >
    A structured intelligence brief with these sections:
    1. Company snapshot (2-3 sentences: what they do, who they serve, any notable recent context)
    2. Lead profile (their role, likely pain points with current meeting tools)
    3. Conversation summary (what was discussed, what they showed interest in, any objections raised)
    4. Best re-engagement angle (the single strongest hook for the email based on all research)
    5. Relevant hq0 features to mention (specific to their context — don't list everything)
    6. Tone guidance (casual/formal, reference to colleague name {colleague_name}, callback to specific thing they said)
  agent: lead_researcher

draft_personalized_email:
  description: >
    Using the intelligence brief from the researcher, write a re-engagement email to
    {lead_name}. The sender is {sender_name} from hq0. The original LinkedIn outreach
    was done by {colleague_name} months ago.

    BANNED PHRASES — if any of these appear in your draft, rewrite it:
    - "I wanted to reach out"
    - "I hope this finds you well"
    - "I wanted to reassure you"
    - "Our platform"
    - "keeps things professional"
    - "simplifying the process"
    - "managing engagements"
    - "Please let me know if you have any questions"
    - "Would love to connect"
    - Any sentence starting with "Our" (too salesy)
    - Any sentence that promotes hq0 features without tying them to something the lead said

    STRICT RULES:
    1. Max 4 sentences in the body — not a word more
    2. First sentence: mention {colleague_name} reached out on LinkedIn + what specifically was
       discussed (be concrete — name the thing, e.g. "the branded meeting room for ReboundTAG")
    3. Second sentence: what's new or what's changed at hq0 since then — mention 2-3 features
       woven naturally into one sentence, not listed
    4. Third sentence (optional): reference something specific the lead said or did in the conversation
    5. Last sentence: one soft question — not a demo request, not "would you like to learn more"
       Something like "Would you want to take another look?" or "Worth a quick chat?"
    6. Sign off: "Best," then {sender_name} on the next line — nothing else

    SUBJECT LINE — write it like a real teammate would:
    GOOD: "Following up on the ReboundTAG room" / "A few things added since Mahi reached out" /
          "Circling back on the branded meeting idea"
    BAD: anything with "!" / "exciting" / "quick question" / generic phrases like "Following up"
         alone with no context

    CALIBRATION — this is the exact voice and length to match:
    ---
    Subject: Following up from our LinkedIn chat

    Hi Sheldon,

    A few months back, Rohan connected with you on LinkedIn about hq0 — the idea of hosting
    meetings on your own branded domain instead of a generic Zoom or Meet link.

    We've added a fair bit since then. Teams are using hq0 now to host fully branded customer
    calls, get notes without any bot sitting in on the meeting, have summaries and follow-ups
    go out on their own, and keep recordings and transcripts all in one place instead of
    scattered across tools. It also plugs into things like Slack, your calendar, CRM, Stripe,
    Zapier — so the stuff that used to take extra steps after a call mostly just happens now.

    There's more beyond that too, but figured this was worth a mention since you'd shown interest
    earlier.

    Would you be up for taking another look?

    Best,
    Rohan
    ---

    Match this exactly in terms of: length, tone (warm but direct), no self-promotion, casual
    mention of features in a single flowing sentence, soft ending question.
  expected_output: >
    A complete, send-ready email in exactly this format (nothing else):

    Subject: [subject line]

    Hi {lead_name},

    [4 sentences max. No brackets, no placeholders, no commentary.]

    Best,
    {sender_name}
  agent: personalized_outreach_specialist
  context:
    - research_lead_intelligence
